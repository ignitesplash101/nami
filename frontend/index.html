<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>nami — scenario explorer</title>
    <meta
      name="description"
      content="LLM-grounded hypothetical stress explorer for equity portfolios — analog-grounded narratives, factor shocks, honest uncertainty. Educational/research only."
    />
    <meta name="theme-color" content="#0b1b2b" />
    <script>
      // Theme boot — runs before first paint so neither theme ever flashes.
      // Explicit choice (localStorage) wins; otherwise follow the OS setting.
      // Keep the two hex values in sync with --bg in src/styles.css and
      // THEME_COLORS in src/theme.ts.
      (function () {
        try {
          var t = localStorage.getItem("nami-theme");
          if (t !== "light" && t !== "dark") {
            t =
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: light)").matches
                ? "light"
                : "dark";
          }
          document.documentElement.dataset.theme = t;
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute("content", t === "light" ? "#f4efe3" : "#0b1b2b");
        } catch (e) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="32x32" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta property="og:title" content="nami — scenario explorer" />
    <meta

      content="LLM-grounded hypothetical stress explorer for equity portfolios — analog-grounded narratives, factor shocks, honest uncertainty. Educational/research only."
    />

    />

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: backend (python 3.12)
    runs-on: ubuntu-latest
    env:
      # Dummy values so app.config.load_config() doesn't raise on import.
      # CI never makes real GCP calls; tests inject InMemoryCache + mock GeminiClient.
      GOOGLE_CLOUD_PROJECT: ci-dummy-project
      VERTEX_AI_LOCATION: global
      GCS_BUCKET: ci-dummy-bucket
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies (incl. dev extras)
        # dev deps (ruff, black, pytest, pytest-cov) live under [project.optional-dependencies]
        # in pyproject.toml — plain `uv sync` skips them.
        run: uv sync --frozen --extra dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Black formatting check
        run: uv run black --check .

      - name: Pytest with coverage
        # Skip network-gated live LLM evals (RUN_NETWORK_TESTS=1 + real $ cost).
        run: uv run pytest tests/ -v --cov=app --cov-report=term --ignore=tests/test_live_evals.py

  frontend:
    name: frontend (node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: Vitest
        run: npm test

      - name: Production build
        run: npm run build

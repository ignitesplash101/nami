substitutions:
  _REGION: asia-northeast1
  _AR_REPO: nami
  _SERVICE: nami
  _RUNTIME_SA: nami-sa@${PROJECT_ID}.iam.gserviceaccount.com

steps:
  # Deploy gate: a push to main must not ship unless the test suite is green.
  # GitHub Actions CI runs the same checks but is a PARALLEL pipeline — it
  # cannot block this trigger, so the gate lives here. Both gate steps start
  # immediately (waitFor: ['-']) and `build` waits on both.
  - id: backend-tests
    name: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    waitFor: ['-']
    entrypoint: sh
    args:
      - -c
      - |
        set -e
        uv sync --frozen --extra dev
        uv run ruff check .
        uv run black --check .
        uv run pytest tests/ -q --ignore=tests/test_live_evals.py
    env:
      # Dummy values so app.config.load_config() doesn't raise on import.
      # Tests inject in-memory cache/Firestore/Gemini doubles — no GCP calls.
      - GOOGLE_CLOUD_PROJECT=ci-dummy-project
      - VERTEX_AI_LOCATION=global
      - GCS_BUCKET=ci-dummy-bucket

  - id: frontend-tests
    name: node:22-slim
    waitFor: ['-']
    entrypoint: sh
    dir: frontend
    args:
      - -c
      - |
        set -e
        npm ci --no-audit --no-fund
        npm run typecheck
        npm test

  - id: build
    name: gcr.io/cloud-builders/docker
    waitFor: ['backend-tests', 'frontend-tests']
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:latest
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --service-account=${_RUNTIME_SA}
      - --memory=2Gi
      - --cpu=1
      # 900s: the decompose stream (up to 15 pipeline reruns over 4 workers) can
      # legitimately exceed the 300s default, which severed it mid-stream as a
      # client-visible network error. Idle-stream leakage stays bounded by the
      # client-side SSE idle guards (60s/120s, heartbeat-aware).
      - --timeout=900
      - --min-instances=0
      - --max-instances=2
      - --concurrency=20
      - --session-affinity
      - --allow-unauthenticated
      - --set-env-vars=GOOGLE_CLOUD_PROJECT=${PROJECT_ID},VERTEX_AI_LOCATION=global,GCS_BUCKET=nami-cache-${PROJECT_ID},ENVIRONMENT=prod,LOG_LEVEL=INFO,RATE_LIMIT_LLM=10/minute,RATE_LIMIT_UNLOCK=5/minute,DAILY_LLM_RUN_CAP=500,DAILY_LLM_COST_CAP_USD=25
      - --set-secrets=PASSCODE=nami-passcode:latest

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:latest

# Test gates + docker build exceed the 10-minute default on the default machine.
timeout: 1800s

options:
  # Required so _RUNTIME_SA expands the nested ${PROJECT_ID} during manual
  # `gcloud builds submit`. Trigger builds get dynamicSubstitutions by default,
  # but manual runs need this explicit. See:
  # https://cloud.google.com/build/docs/configuring-builds/substitute-variable-values
  dynamicSubstitutions: true
  logging: CLOUD_LOGGING_ONLY
  # The pytest suite is CPU-bound (numpy/shap); the default 1-vCPU machine
  # would roughly triple the gate time for ~$0.10/build of savings.
  machineType: E2_HIGHCPU_8
